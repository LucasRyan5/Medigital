<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Medigital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-white shadow-2xl rounded-2xl overflow-hidden m-4 p-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 text-blue-700 rounded-full mb-4">
                <i class="fas fa-key text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Esqueceu a senha?</h2>
            <p class="text-gray-500 text-sm mt-2">Informe seu e-mail cadastrado ou CRM para receber as instruções de recuperação.</p>
        </div>

        <form id="recoverForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700">E-mail ou CRM</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="text" id="userInput" placeholder="exemplo@medigital.com" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
            </div>

            <button type="submit" id="btnRecover"
                class="w-full bg-blue-700 text-white py-3 rounded-lg font-bold hover:bg-blue-800 shadow-lg transition-all transform active:scale-[0.98]">
                Enviar Instruções
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="login.html" class="text-sm text-blue-600 hover:underline font-medium">
                <i class="fas fa-arrow-left mr-2"></i>Voltar para o Login
            </a>
        </div>
    </div>

    <div id="successModal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
            <i class="fas fa-check-circle text-6xl text-green-500 mb-4"></i>
            <h3 class="text-xl font-bold text-gray-800">E-mail Enviado!</h3>
            <p class="text-gray-500 mt-2">Se os dados estiverem corretos, você receberá um link em instantes.</p>
            <button onclick="window.location.href='login.html'" class="mt-6 w-full bg-gray-800 text-white py-2 rounded-lg font-bold">Entendido</button>
        </div>
    </div>

    <script src="recuperar.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Profissional - Medigital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white shadow-2xl rounded-3xl overflow-hidden flex flex-col md:flex-row">
        
        <div class="md:w-1/3 bg-blue-700 p-8 text-white flex flex-col justify-center">
            <h2 class="text-2xl font-bold mb-4">Novo Profissional</h2>
            <p class="text-blue-100 text-sm mb-6">Cadastre médicos e especialistas para liberar o acesso ao prontuário eletrônico e agenda.</p>
            <ul class="space-y-4 text-sm">
                <li class="flex items-center gap-2"><i class="fas fa-check-circle"></i> Validação de CRM ativa</li>
                <li class="flex items-center gap-2"><i class="fas fa-check-circle"></i> Conformidade com a LGPD</li>
                <li class="flex items-center gap-2"><i class="fas fa-check-circle"></i> Acesso via Certificado Digital</li>
            </ul>
        </div>

        <form id="medicoForm" class="md:w-2/3 p-8 md:p-12 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700">Nome Completo</label>
                    <input type="text" id="nome" required class="w-full mt-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700">CRM</label>
                    <input type="text" id="crm" placeholder="000000" required class="w-full mt-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">UF de Registro</label>
                    <select id="uf" class="w-full mt-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                        <option value="SP">São Paulo (SP)</option>
                        <option value="RJ">Rio de Janeiro (RJ)</option>
                        <option value="MG">Minas Gerais (MG)</option>
                        </select>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700">Especialidade Principal</label>
                    <input type="text" id="especialidade" placeholder="Ex: Cardiologia" required class="w-full mt-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700">E-mail Profissional</label>
                    <input type="email" id="email" placeholder="medico@medigital.com" required class="w-full mt-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-gray-300">
                </div>
            </div>

            <div class="flex items-center gap-2 text-xs text-gray-500 bg-gray-50 p-3 rounded-lg border border-dashed border-gray-300">
                <i class="fas fa-info-circle text-blue-500"></i>
                Uma senha temporária será enviada para o e-mail cadastrado.
            </div>

            <div class="flex justify-end gap-4 mt-8">
                <button type="button" onclick="window.location.href='dashboard.html'" class="px-6 py-3 text-gray-500 font-bold hover:bg-gray-100 rounded-xl transition">Cancelar</button>
                <button type="submit" class="px-8 py-3 bg-blue-700 text-white font-bold rounded-xl shadow-lg hover:bg-blue-800 transition active:scale-95">Finalizar Cadastro</button>
            </div>
        </form>
    </div>

    <script src="cadastro-medico.js"></script>
</body>
</html>
